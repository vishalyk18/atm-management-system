<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium ATM System</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="overlay active">
        <div class="auth-card glass">
            <h1 class="premium-title">ATM System</h1>
            <div class="tabs">
                <button id="login-tab" class="tab-btn active">Login</button>
                <button id="register-tab" class="tab-btn">Register</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-account">Account Number</label>
                    <input type="text" id="login-account" placeholder="Enter account number" required>
                </div>
                <div class="input-group">
                    <label for="login-pin">PIN</label>
                    <input type="password" id="login-pin" placeholder="Enter PIN" required>
                </div>
                <button type="submit" class="btn primary-btn">Login to Vault</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-account">Account Number</label>
                    <input type="text" id="reg-account" placeholder="Choose account number" required>
                </div>
                <div class="input-group">
                    <label for="reg-pin">PIN</label>
                    <input type="password" id="reg-pin" placeholder="Set PIN" required>
                </div>
                <div class="input-group">
                    <label for="reg-balance">Initial Balance</label>
                    <input type="number" id="reg-balance" placeholder="0.00" value="0" required>
                </div>
                <button type="submit" class="btn primary-btn">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <main id="dashboard" class="hidden">
        <header class="glass">
            <div class="logo">Premium ATM</div>
            <div class="user-info">
                <span id="display-account">Account: ---</span>
                <button id="logout-btn" class="btn secondary-btn">Logout</button>
            </div>
        </header>

        <section class="overview">
            <div class="balance-card glass">
                <div class="card-glow"></div>
                <span class="label">Current Balance</span>
                <h2 id="balance-amount">$0.00</h2>
                <div class="actions">
                    <button id="deposit-trigger" class="btn action-btn">Deposit</button>
                    <button id="withdraw-trigger" class="btn action-btn">Withdraw</button>
                </div>
            </div>
        </section>

        <section class="history-section glass">
            <h3>Transaction History</h3>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- History rows will go here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Operation Modal -->
    <div id="operation-modal" class="modal">
        <div class="modal-content glass">
            <h3 id="modal-title">Deposit Funds</h3>
            <div class="input-group">
                <label for="operation-amount">Amount</label>
                <input type="number" id="operation-amount" placeholder="0.00" step="0.01">
            </div>
            <div class="modal-buttons">
                <button id="modal-cancel" class="btn secondary-btn">Cancel</button>
                <button id="modal-confirm" class="btn primary-btn">Proceed</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
